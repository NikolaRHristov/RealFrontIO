// capsule/proto/world_events.proto (Updated to include Historical endpoint)
syntax = "proto3";
package openfront.events;

// ... existing enums and messages ...

message HistoricalSubscribeRequest {
  string server_id = 1;
  uint64 start_epoch_ms = 2;
  uint64 end_epoch_ms = 3;
  float playback_speed_multiplier = 4; // e.g. 10x real-time
}

service WorldMonitorStreamer {
  rpc SubscribeToWorldEvents (SubscribeRequest) returns (stream TickEventBatch);
  rpc SubscribeToHistoricalEvents (HistoricalSubscribeRequest) returns (stream TickEventBatch);
}